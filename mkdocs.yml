      - 😴 Ритуал на сон: important/sleep_ritual.md
      - 👕 Как одевать на прогулку: important/how_to_dress.md
      - 🤸 Выкладывание на живот: important/laying_on_the_stomach.md
      - 📈 Скачки роста: important/growth_spurts.md

  - 📁 Категории:
      - 👶🏻 0–3 месяца:

          - Факты о новорожденном: categories/0_3_months/newborn_facts.md

          - Развитие ребенка 0–1 месяц: categories/0_3_months/development_0_1.md

          - Развитие ребенка 1–2 месяца: categories/0_3_months/development_1_2.md

