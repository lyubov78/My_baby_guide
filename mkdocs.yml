site_url: https://lyubov78.github.io/My_baby_guide/
site_name: Справочник малыша

theme:
  name: material
  language: ru

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences

nav:

  - 🏠 Главная: index.md

  - ⭐ Важные статьи:
